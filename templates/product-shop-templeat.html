<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Product Card</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .card-shop {
      width: 321px;
      border: 1.5px solid #DCE0E5;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
    }

    .card-shop-img-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      height: 280px;
      border-bottom: 1px solid #DCE0E5;
      border-top-left-radius: 15px;
      border-top-right-radius: 15px;
      padding: 0 20px 20px;
    }

    .card-shop-img-wrapper img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }



    .card-shop-body {
      padding: 12px 20px 20px 20px;
      display: flex;
      flex-direction: column;
    }

    .product-card-title {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 18px;
      color: #121212;
      margin: 0 0 5px 0;
      line-height: 1.3;
    }

    .priceing {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 24px;
    }

    .priceing p {
      margin: 0;
    }

    .price {
      color: #16C776;
      /* Bright vibrant green */
      font-size: 18px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
    }

    .old-price {
      display: none;
      /* No old price shown in reference image */
    }

    .currency {
      color: #7A8B9E;
      /* Cool gray */
      font-size: 14px;
      font-weight: 500;
    }

    .product-card-btn {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .product-card-btn-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-add-cart {
      background-color: #14D0AC;
      color: #FFFFFF;
      border-radius: 6px;
      padding: 10px 16px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 12px;
      text-decoration: none;
      transition: background-color 0.2s, transform 0.1s;
    }

    .btn-add-cart:hover {
      background-color: #0fb896;
    }

    .btn-add-cart:active {
      transform: scale(0.98);
    }

    .btn-save {
      background-color: #E6F0FF;
      /* Soft light blue */
      border-radius: 6px;
      width: 30px;
      height: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      transition: background-color 0.2s;
    }

    .btn-save:hover {
      background-color: #d0e7f9;
    }

    .btn-save img {
      width: 16px;
      height: 16px;
    }

    .btn-compare {
      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
    }

    .btn-compare img {
      width: 24px;
      height: 24px;
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    .btn-compare:hover img {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="card-shop">
    <div class="card-shop-img-wrapper">
      <img src="../assets/images/demo-product-shop.png" alt="YAG Iridectomy Lens">
    </div>

    <div class="card-shop-body">
      <h3 class="product-card-title">YAG Iridectomy Lens</h3>
      <div class="priceing">
        <p class="price">1800</p>
        <p class="old-price">1900</p>
        <p class="currency">EGP</p>
      </div>

      <div class="product-card-btn">
        <div class="product-card-btn-left">
          <a href="#" class="btn-add-cart">Add to cart</a>
          <a href="#" class="btn-save"><img src="../assets/images/save-product-icon.svg" alt="Save"></a>
        </div>
        <div>
          <a href="#" class="btn-compare"><img src="../assets/images/Show-icon.svg" alt="Compare/View"></a>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
